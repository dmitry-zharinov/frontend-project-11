<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSS агрегатор</title>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

  <!-- Hero -->
  <div class="bg-dark text-white py-5">
    <div class="container">

      <h1 class="display-3 mb-3">RSS агрегатор</h1>

      <p class="lead">
        Начните читать RSS сегодня! Это легко, это красиво.
      </p>

      <form class="rss-form mt-4">
        <div class="row g-3">

          <div class="col-12 col-md-8">
            <input
              type="url"
              name="url"
              class="form-control form-control-lg"
              placeholder="Ссылка RSS"
              required
            />
            <small class="text-secondary">
              Пример: https://lorem-rss.hexlet.app/feed
            </small>
          </div>

          <div class="col-12 col-md-4">
            <button
              type="submit"
              class="btn btn-lg btn-primary w-100"
            >
              Добавить
            </button>
          </div>

        </div>
      </form>

    </div>
  </div>

  <!-- Контент -->
  <main class="container my-5 flex-grow-1">
    <!-- Здесь позже будут фиды и посты -->
  </main>

  <!-- Footer -->
  <footer class="bg-light border-top py-3 text-center">
    <small>
      created by <a href="https://hexlet.io" target="_blank">Hexlet</a>
    </small>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
